<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Little Content Engine .. that can — LearningMate &amp; Chegg</title>
<style>
:root {
  --chegg-orange:#FF6B00; --chegg-orange-soft:#FFF0E6; --chegg-orange-line:#FFCBA3;
  --lm-green:#1F8A5B; --lm-green-soft:#E5F3EC; --lm-green-line:#BCE0CC;
  --ink:#0E1A2B; --ink-2:#16263b;
  --paper:#FFFFFF; --mist:#F5F7FA; --hair:#E2E8F0; --slate:#5E7082; --slate-2:#8595A4;
  --l1:#2B6CB0; --l1-soft:#E7EFF8; --l1-line:#C3D8EE;
  --l2:#805AD5; --l2-soft:#F0EBF9; --l2-line:#D6BCFA;
  --l3:#1F8A5B; --l3-soft:#E5F3EC; --l3-line:#BCE0CC;
  --l4:#C2691F; --l4-soft:#F7EBDF; --l4-line:#E8CDB2;
  --p2:#B23A48; --p2-soft:#F6E3E5; --p2-line:#E7C2C7;
  --display:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;scroll-behavior:smooth;}
body{background:var(--mist);color:var(--ink);font-family:var(--display);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
.mono{font-family:var(--mono);}

/* ── APPBAR ── */
.appbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#EAF0F6;display:flex;align-items:center;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.appbar-brand{display:flex;align-items:center;gap:12px;padding:0 20px;border-right:1px solid rgba(255,255,255,.1);height:100%;min-width:210px;}
.chegg-logo{display:flex;align-items:center;gap:2px;font-weight:900;font-size:18px;letter-spacing:-.02em;}
.chegg-logo .c{color:var(--chegg-orange);}
.chegg-logo .rest{color:#fff;}
.brand-sep{width:1px;height:22px;background:rgba(255,255,255,.2);margin:0 10px;}
.lm-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#7FA0BE;font-weight:700;line-height:1.4;}
.nav{display:flex;gap:2px;padding:0 10px;height:100%;align-items:center;}
.nav-btn{background:transparent;border:0;color:#A9BED2;padding:0 12px;height:40px;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .15s;}
.nav-btn:hover{color:#EAF0F6;background:rgba(255,255,255,.07);}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.13);}
.nb{min-width:18px;height:18px;border-radius:9px;background:var(--chegg-orange);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.appbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 16px;}
.pchip{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.15);color:#B9C7D6;}
.pchip .led{width:7px;height:7px;border-radius:50%;background:var(--lm-green);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* reset bar — hidden, triggered via Chegg logo secret click */
.reset-secret{display:none;}
/* chegg logo is the secret reset button */
.chegg-logo{display:flex;align-items:center;gap:2px;font-weight:900;font-size:18px;letter-spacing:-.02em;cursor:pointer;user-select:none;}
.chegg-logo:active{opacity:.7;}

/* ── LAYOUT ── */
.page-wrap{max-width:1320px;margin:0 auto;padding:26px 22px 80px;}
.page-header{margin-bottom:26px;}
.eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:var(--slate);margin:0 0 7px;}
.page-title{font-size:25px;font-weight:900;letter-spacing:-.025em;margin:0 0 8px;}
.page-sub{color:var(--slate);max-width:72ch;font-size:14px;margin:0;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap;}
.badge.ai{background:var(--lm-green-soft);color:#0f5c3a;border:1px solid var(--lm-green-line);}
.badge.human{background:var(--l4-soft);color:#8a4811;border:1px solid var(--l4-line);}
.badge.l1{background:var(--l1-soft);color:#1d4f86;border:1px solid var(--l1-line);}
.badge.l2{background:var(--l2-soft);color:#553098;border:1px solid var(--l2-line);}
.badge.l3{background:var(--lm-green-soft);color:#0f5c3a;border:1px solid var(--lm-green-line);}
.badge.l4{background:var(--l4-soft);color:#8a4811;border:1px solid var(--l4-line);}
.badge.p2{background:var(--p2-soft);color:#831e2a;border:1px solid var(--p2-line);}
.badge.orange{background:var(--chegg-orange-soft);color:#b34a00;border:1px solid var(--chegg-orange-line);}
.badge.pending{background:#FFF9E6;color:#8a6800;border:1px solid #F0D77A;}
.badge.done{background:var(--lm-green-soft);color:#0f5c3a;border:1px solid var(--lm-green-line);}
.sev{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;}
.sev.high{background:var(--p2-soft);color:var(--p2);}
.sev.med{background:var(--l4-soft);color:#8a4811;}
.sev.low{background:var(--mist);color:var(--slate);border:1px solid var(--hair);}

/* ── CARDS / PANELS ── */
.card{background:var(--paper);border:1px solid var(--hair);border-radius:14px;}
.panel{background:var(--paper);border:1px solid var(--hair);border-radius:14px;padding:22px;margin-bottom:20px;}
.panel-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.panel-head h2{font-size:16px;font-weight:800;margin:0;}
.panel-head .hint{font-size:12px;color:var(--slate-2);margin-left:auto;}
.section-lead{font-size:13px;color:var(--slate);margin:0 0 16px;}

/* ── METRICS ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.metric{background:var(--paper);border:1px solid var(--hair);border-radius:13px;padding:16px 20px;position:relative;overflow:hidden;}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--hair));}
.metric .k{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--slate);font-weight:700;}
.metric .v{font-size:28px;font-weight:900;letter-spacing:-.03em;margin:5px 0 2px;}
.metric .v small{font-size:14px;font-weight:600;color:var(--slate);}
.metric .trend{font-size:11.5px;color:var(--slate-2);}

/* ── BUTTONS ── */
.btn{border:1px solid var(--hair);background:var(--paper);border-radius:9px;padding:9px 15px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:all .15s;cursor:pointer;}
.btn:hover{border-color:var(--l1-line);background:var(--l1-soft);}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn.primary:hover{background:var(--ink-2);}
.btn.orange{background:var(--chegg-orange);color:#fff;border-color:var(--chegg-orange);}
.btn.orange:hover{filter:brightness(1.06);}
.btn.green{background:var(--lm-green);color:#fff;border-color:var(--lm-green);}
.btn.green:hover{filter:brightness(1.06);}
.btn.ghost{background:transparent;border-color:transparent;}
.btn.ghost:hover{background:var(--mist);border-color:var(--hair);}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:7px;}
.btn.danger{background:var(--p2-soft);color:var(--p2);border-color:var(--p2-line);}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none;}

/* ── PIPELINE RAIL ── */
.pipeline-rail{display:flex;align-items:stretch;background:var(--paper);border:1px solid var(--hair);border-radius:14px;overflow:hidden;margin-bottom:24px;}
.pipe-step{flex:1;padding:16px 14px;display:flex;flex-direction:column;gap:5px;border-right:1px solid var(--hair);position:relative;}
.pipe-step:last-child{border-right:0;}
.pipe-step::after{content:'▶';position:absolute;top:50%;right:-9px;transform:translateY(-50%);color:var(--hair);font-size:11px;z-index:2;}
.pipe-step:last-child::after{display:none;}
.pipe-step .ps-num{font-family:var(--mono);font-size:10px;color:var(--slate-2);font-weight:700;}
.pipe-step .ps-name{font-weight:800;font-size:13px;line-height:1.2;}
.pipe-step .ps-sub{font-size:11.5px;color:var(--slate);line-height:1.3;}
.pipe-step .ps-count{margin-top:auto;padding-top:10px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--chegg-orange);}

/* ── RESEARCH / SIGNAL ROWS ── */
.signal-row{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:1px solid var(--hair);}
.signal-row:last-child{border-bottom:0;}
.score-ring{width:44px;height:44px;border-radius:50%;background:conic-gradient(var(--lm-green) calc(var(--pct)*3.6deg),var(--hair) 0);display:grid;place-items:center;flex:0 0 44px;position:relative;}
.score-ring::before{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--paper);}
.score-ring .sv{position:relative;z-index:1;font-family:var(--mono);font-size:11px;font-weight:800;line-height:1;}
.sig-body{flex:1;min-width:0;}
.sig-title{font-weight:700;font-size:13.5px;margin:0 0 5px;}
.sig-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--slate);}
.sig-why{font-size:12px;color:var(--slate);margin-top:5px;font-style:italic;}
.sig-right{display:flex;flex-direction:column;gap:7px;align-items:flex-end;flex:0 0 auto;}

/* ── CLASSIFY LAYER CARDS ── */
.layer-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:20px;}
.layer-card{border-radius:12px;padding:14px;border:2px solid var(--bdr,var(--hair));background:var(--bg,var(--mist));cursor:pointer;transition:all .15s;position:relative;}
.layer-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px -12px rgba(0,0,0,.3);}
.layer-card.selected{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,107,0,.2);transform:translateY(-2px);}
.layer-card .lc-tick{display:none;position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--chegg-orange);color:#fff;font-size:11px;align-items:center;justify-content:center;font-weight:800;}
.layer-card.selected .lc-tick{display:flex;}
.layer-card .lc-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--acc);}
.layer-card .lc-name{font-weight:800;font-size:13.5px;margin:5px 0 3px;}
.layer-card .lc-cad{font-size:11.5px;color:var(--slate);}
.layer-card.l1{--bdr:var(--l1-line);--bg:var(--l1-soft);--acc:var(--l1);}
.layer-card.l2{--bdr:var(--l2-line);--bg:var(--l2-soft);--acc:var(--l2);}
.layer-card.l3{--bdr:var(--lm-green-line);--bg:var(--lm-green-soft);--acc:var(--lm-green);}
.layer-card.l4{--bdr:var(--l4-line);--bg:var(--l4-soft);--acc:var(--l4);}
.layer-card.p2{--bdr:var(--p2-line);--bg:var(--p2-soft);--acc:var(--p2);}
/* filter pills in classify */
.layer-filter-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.lfp{border:1px solid var(--hair);background:var(--paper);padding:5px 13px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--slate);cursor:pointer;transition:all .15s;}
.lfp:hover,.lfp.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.lfp.on.l1{background:var(--l1);border-color:var(--l1);}
.lfp.on.l2{background:var(--l2);border-color:var(--l2);}
.lfp.on.l3{background:var(--lm-green);border-color:var(--lm-green);}
.lfp.on.l4{background:var(--l4);border-color:var(--l4);}
.lfp.on.p2{background:var(--p2);border-color:var(--p2);}

/* ── RUBRIC ── */
.rubric{display:grid;gap:12px;margin-bottom:18px;}
.rub{display:grid;grid-template-columns:155px 1fr 46px;gap:10px;align-items:center;font-size:13px;}
.rub label{font-weight:600;color:var(--slate);}
.rub input[type=range]{width:100%;accent-color:var(--chegg-orange);}
.rub .rv{font-family:var(--mono);font-weight:800;text-align:right;}
.reco-box{background:var(--lm-green-soft);border:1px solid var(--lm-green-line);border-radius:10px;padding:13px 16px;font-size:13.5px;color:#0f5c3a;font-weight:700;margin-bottom:18px;display:flex;align-items:flex-start;gap:10px;}

/* ── ITEM TRACKER BANNER ── */
.tracker-banner{background:linear-gradient(135deg,#0f2a1a,#1a3a2a);border:1px solid var(--lm-green-line);border-radius:12px;padding:16px 20px;margin-bottom:22px;color:#E5F3EC;}
.tracker-banner .tb-title{font-weight:800;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.tracker-steps{display:flex;align-items:center;gap:0;flex-wrap:nowrap;overflow-x:auto;}
.ts{display:flex;align-items:center;gap:0;}
.ts-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:rgba(255,255,255,.4);flex:0 0 28px;transition:all .3s;}
.ts-dot.done{background:var(--lm-green);border-color:var(--lm-green);color:#fff;}
.ts-dot.active{background:var(--chegg-orange);border-color:var(--chegg-orange);color:#fff;box-shadow:0 0 0 4px rgba(255,107,0,.25);}
.ts-label{font-size:10px;color:rgba(255,255,255,.5);margin:0 6px;white-space:nowrap;max-width:80px;text-align:center;line-height:1.3;}
.ts-label.done{color:#7FD0A6;}
.ts-label.active{color:#fff;font-weight:700;}
.ts-bar{width:30px;height:2px;background:rgba(255,255,255,.15);flex:0 0 30px;}
.ts-bar.done{background:var(--lm-green);}

/* ── BLUEPRINT OUTPUT ── */
.blueprint-output{background:var(--ink);color:#DCE6F0;border-radius:12px;padding:22px;margin-top:18px;font-family:var(--mono);font-size:12.5px;line-height:1.8;max-height:420px;overflow-y:auto;white-space:pre-wrap;}
.blueprint-output .bp-head{color:var(--chegg-orange);font-weight:700;font-size:13.5px;}
.blueprint-output .bp-section{color:#7FD0A6;}
.gap-table{width:100%;border-collapse:collapse;font-size:13px;}
.gap-table th{background:var(--mist);padding:9px 12px;text-align:left;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border-bottom:2px solid var(--hair);}
.gap-table td{padding:10px 12px;border-bottom:1px solid var(--hair);vertical-align:top;}
.gap-table tr:hover td{background:var(--mist);}
.gap-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;}
.gap-badge.missing{background:var(--p2-soft);color:var(--p2);border:1px solid var(--p2-line);}
.gap-badge.outdated{background:var(--l4-soft);color:#8a4811;border:1px solid var(--l4-line);}
.gap-badge.current{background:var(--lm-green-soft);color:#0f5c3a;border:1px solid var(--lm-green-line);}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start;}
.kol{background:var(--mist);border-radius:12px;padding:11px;}
.kol-head{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:0 3px;}
.kh-name{font-weight:800;font-size:12.5px;}
.kh-count{width:20px;height:20px;border-radius:10px;background:var(--ink);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-left:auto;}
.k-card{background:var(--paper);border:1px solid var(--hair);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;}
.k-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px -10px rgba(0,0,0,.2);}
/* NEW ITEM FLASH */
.k-card.new-item{border-color:var(--chegg-orange);animation:flash-border 1.2s ease infinite;}
@keyframes flash-border{0%,100%{border-color:var(--chegg-orange);box-shadow:0 0 0 2px rgba(255,107,0,.35);}50%{border-color:transparent;box-shadow:none;}}
.k-card .new-pip{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--chegg-orange);}
.kc-title{font-weight:700;font-size:13px;margin:0 0 7px;line-height:1.3;}
.kc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:7px;}
.kc-assign{font-size:11.5px;color:var(--slate);display:flex;align-items:center;gap:5px;margin-top:7px;}
.kc-assign .av{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 22px;}
.kc-due{font-size:11px;font-family:var(--mono);color:var(--slate-2);margin-top:4px;}
.kc-due.overdue{color:var(--p2);}

/* ── SCHEDULE ── */
.sch-row{display:grid;grid-template-columns:130px 1fr auto;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid var(--hair);}
.sch-row:last-child{border-bottom:0;}
.sch-date{font-weight:800;font-size:13px;}
.sch-date small{display:block;font-weight:600;font-size:11px;color:var(--slate-2);margin-top:2px;}
.sch-topic{font-size:14px;font-weight:700;}
.sch-topic.empty{color:var(--slate-2);font-style:italic;font-weight:500;}
.sch-chips{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:5px;}
.stepper{display:flex;align-items:center;}
.step{display:flex;align-items:center;}
.step-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--hair);background:var(--paper);display:grid;place-items:center;font-size:8px;}
.step.done .step-dot{background:var(--lm-green);border-color:var(--lm-green);color:#fff;}
.step.cur .step-dot{border-color:var(--chegg-orange);background:var(--chegg-orange-soft);}
.step-bar{width:20px;height:2px;background:var(--hair);}
.step.done .step-bar{background:var(--lm-green);}
.sch-act button{border:1px solid var(--hair);background:var(--paper);border-radius:8px;padding:7px 12px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;}
.sch-act button:hover{border-color:var(--l1-line);background:var(--l1-soft);}
.sch-act button.pub{background:var(--lm-green-soft);border-color:var(--lm-green-line);color:#0f5c3a;}

/* ── AGENT OUTPUT ── */
.agent-out{background:var(--ink);color:#a8d8a0;border-radius:10px;padding:16px;font-family:var(--mono);font-size:12px;line-height:1.8;min-height:80px;max-height:260px;overflow-y:auto;white-space:pre-wrap;margin-top:12px;}
.blink{animation:blink .7s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── PROGRESS BAR ── */
.prog-bar{height:6px;background:var(--hair);border-radius:3px;overflow:hidden;}
.prog-bar .fill{height:100%;border-radius:3px;transition:width .4s ease;}
.vchip{display:inline-block;font-family:var(--mono);font-size:11px;background:var(--mist);border:1px solid var(--hair);border-radius:5px;padding:1px 7px;color:var(--slate);font-weight:600;}

/* ── TOAST ── */
#toasts{position:fixed;bottom:22px;right:22px;z-index:99;display:flex;flex-direction:column;gap:9px;}
.toast{background:var(--ink);color:#EAF0F6;padding:12px 16px;border-radius:10px;font-size:13px;box-shadow:0 14px 30px -14px rgba(0,0,0,.6);display:flex;align-items:center;gap:10px;animation:toastin .25s ease;max-width:360px;}
.toast .tle{width:8px;height:8px;border-radius:50%;background:var(--chegg-orange);flex:0 0 auto;}
.toast.green .tle{background:var(--lm-green);}
.toast .tsub{font-size:11px;color:#9FC4E8;margin-top:2px;}
@keyframes toastin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(14,26,43,.55);backdrop-filter:blur(3px);z-index:70;display:none;align-items:center;justify-content:center;padding:24px;}
.overlay.show{display:flex;}
.modal{background:var(--paper);border-radius:16px;width:min(760px,100%);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px -30px rgba(0,0,0,.6);}
.modal-bar{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--ink);color:#EAF0F6;}
.modal-bar .traffic{display:flex;gap:5px;}
.modal-bar .traffic i{width:11px;height:11px;border-radius:50%;display:block;}

.rd-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.rd-card{background:var(--paper);border:1px solid var(--hair);border-radius:13px;padding:18px 20px;}
.rd-card-head{display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.rd-card-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 30px;}
.rd-card-title{font-weight:800;font-size:13.5px;}
.rd-card ul{margin:0;padding:0 0 0 16px;list-style:disc;}
.rd-card li{font-size:13px;color:var(--slate);margin:5px 0;line-height:1.5;}
.rd-card li strong{color:var(--ink);}
.rd-card p{font-size:13px;color:var(--slate);margin:0;line-height:1.55;}

.rd-delta{background:var(--paper);border:1px solid var(--hair);border-radius:13px;padding:18px 20px;margin-bottom:20px;}

.rd-delta-cell.miss{color:var(--p2);}
.rd-delta-cell.old{color:#8a4811;}
.rd-delta-cell.ok{color:#0f5c3a;}

.rd-actions{display:flex;gap:12px;flex-wrap:wrap;padding:18px 20px;background:var(--paper);border:1px solid var(--hair);border-radius:13px;}
.rd-actions .divider{width:1px;background:var(--hair);align-self:stretch;}

/* ── REVIEW QUEUE LIST ── */
.rv-row{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--hair);cursor:pointer;transition:background .1s;border-radius:8px;}

function updateResearchBadge() {
  const nb = document.getElementById('nb-research');
  if(nb) nb.textContent = state.research.filter(r=>r.status==='new').length;
}

function toast(msg, green=false, sub='') {
  const t = document.createElement('div');
  t.className = 'toast' + (green?' green':'');
  t.innerHTML = `<span class="tle"></span><div><div>${esc(msg)}</div>${sub?`<div class="tsub">${esc(sub)}</div>`:''}</div>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(), 4500);
}

function closeModal() { document.getElementById('overlay').classList.remove('show'); }
function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal();});

function layerBadge(l) {
  const map={L1:'l1',L2:'l2',L3:'l3',L4:'l4',P2:'p2'};
  const names={L1:'L1 Foundation',L2:'L2 Platform',L3:'L3 Drop',L4:'L4 Catch-up',P2:'Program 2'};
  return `<span class="badge ${map[l]||''}">${esc(names[l]||l)}</span>`;
}
function statusBadge(s) {
  const map={new:'<span class="badge orange">⊕ New signal</span>',decided:'<span class="badge l1">✓ Decided</span>',drafting:'<span class="badge l3">✎ Drafting</span>','in-review':'<span class="badge l2">⧖ In review</span>',producing:'<span class="badge l4">⚙ Producing</span>',published:'<span class="badge done">✓ Published</span>',planned:'<span class="badge pending">◷ Planned</span>','new-trigger':'<span class="badge p2">⚡ Triggered</span>'};
  return map[s]||`<span class="badge">${esc(s)}</span>`;
}

const TRACKER_STAGES = ['Research Queue','Review & Decide','Blueprint','Production','Published'];

function trackerBanner() {
  if(!state.activeItem) return '';
  const item = state.activeItem;
  const stage = state.activeStage;
  return `
<div class="tracker-banner">
  <div class="tb-title">
    <span>📍</span>
    <span>Tracking: <strong>${esc(item.topic.length>60?item.topic.slice(0,60)+'…':item.topic)}</strong></span>
    ${layerBadge(item.layer)}
  </div>
  <div class="tracker-steps">
    ${TRACKER_STAGES.map((s,i)=>{
      const isDone = i < stage || (i === stage && i === TRACKER_STAGES.length - 1);
      const isActive = i === stage && i < TRACKER_STAGES.length - 1;
      return `
    <div class="ts">
      <div>
        <div style="display:flex;align-items:center;flex-direction:column;gap:4px;">
          <div class="ts-dot ${isDone?'done':isActive?'active':''}">${isDone?'✓':i+1}</div>
          <div class="ts-label ${isDone?'done':isActive?'active':''}">${s}</div>
        </div>
      </div>
      ${i<TRACKER_STAGES.length-1?`<div class="ts-bar ${i<stage?'done':''}"></div>`:''}
    </div>`;}).join('')}
  </div>
</div>`;
}

function simulateAgent() {
  const out = document.getElementById('agent-output');
  if(!out) return;
  out.style.display='block';
  const pool = [
    {topic:'Anthropic Claude 4 Sonnet — extended thinking mode',layer:'L3',score:89,sev:'high'},
    {topic:'OpenAI Canvas — collaborative document editing GA',layer:'L3',score:82,sev:'high'},
    {topic:'Notion AI — full multi-step agent in workspace',layer:'L3',score:77,sev:'med'},
    {topic:'Lovable.dev — no-code app building goes viral',layer:'L3',score:85,sev:'high'},
    {topic:'Google NotebookLM Plus — professional features launch',layer:'L3',score:74,sev:'med'},
  ];
  const pick = pool[Math.floor(Math.random()*pool.length)];
  out.innerHTML = '<span class="blink">▋</span>';
  let log='';
  const lines=[
    '[09:00:01] Research Agent started',
    '[09:00:03] Scanning: OpenAI, Anthropic, Google, Microsoft release notes...',
    '[09:00:05] Scanning: GitHub, HuggingFace, ArXiv, TechCrunch, VentureBeat...',
    '[09:00:08] Monitoring: vibe coding, agentic AI, low-code, automation trends...',
    '[09:00:11] Scanning: Lovable, Base44, Cursor, Replit, Bolt.new, Notion AI...',
    '[09:00:14] Cross-referencing against catalogue v3.0...',
    '[09:00:17] Gap analysis complete. Evaluating instructional significance...',
    '',
    `[09:00:19] ✦ NEW CANDIDATE — Score: ${pick.score}/100`,
    `[09:00:19] Topic:    ${pick.topic}`,
    `[09:00:20] Layer:    ${pick.layer} · Bi-weekly Update Drop`,
    `[09:00:20] Severity: ${pick.sev.toUpperCase()}`,
    '[09:00:21] Rationale: Working professional can apply this immediately',
    '[09:00:22] Delta check: net-new vs current catalogue ✓',
    '',
    '[09:00:23] Appending to research queue... ✓',
    '[09:00:24] Sweep complete.',
  ];
  let i=0;
  const iv=setInterval(()=>{
    if(i<lines.length){log+=lines[i]+'\n';out.innerHTML=esc(log)+'<span class="blink">▋</span>';i++;}
    else{
      clearInterval(iv);
      out.innerHTML=esc(log);
      state.research.unshift({
        id:'r_'+Date.now(),topic:pick.topic,source:'Agent sweep',layer:pick.layer,
        score:pick.score,sev:pick.sev,why:'Auto-detected by Research Agent sweep',
        platform:'All',detected:NOW.toISOString().slice(0,10),status:'new'
      });
      updateResearchBadge();
      toast('New L3 signal added to queue',true,'Click "→ Review & Decide" to process it');
      setTimeout(renderResearch,200);
    }
  },75);
}

/* Key wiring: load a signal into Review & Decide */
function pickAndClassify(id) {
  const r = state.research.find(x=>x.id===id);
  if(!r) return;
  r.status = 'decided';
  state.activeItem = r;
  state.activeStage = 1;
  state.classify.selected = r.layer;
  updateResearchBadge();
  // Re-render classify in place if already on that view, otherwise navigate
  if(state.currentView === 'classify') {
    renderClassify();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    toast('Loaded for review', true, r.topic.slice(0,55));
    setView('classify');
  }
}

function updateRubric(el) {
  state.classify.rubric[el.dataset.k] = parseInt(el.value);
  const rv = document.getElementById('rv-'+el.dataset.k);
  if(rv) rv.textContent = el.value;
}

function computeReco() {
  const r = state.classify.rubric;
  const vals = Object.values(r);
  const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  let layer, reason;
  if(r.scopeNew>75&&r.depthNeed>75){layer='L1';reason='High depth + scope → foundational';}
  else if(r.deltaSize>78&&r.depthNeed>65){layer='L2';reason='Large delta → platform course update';}
  else if(r.cadence>80&&avg>55){layer='L3';reason='Strong cadence fit → bi-weekly drop';}
  else if(r.assetReuse>65){layer='L4';reason='High reuse → catch-up module';}
  else{layer='P2';reason='Domain scope → Program 2 track';}
  const priority = avg>72?'High':avg>52?'Medium':'Low';
  return {layer, priority, avg, text:`Recommended: ${layer} · Priority ${priority}`, reason};
}

/* ═══════════════════════════════════════════════════
   PRODUCTION BOARD
═══════════════════════════════════════════════════ */
function renderProduction() {
  const v = document.getElementById('view');
  const cols = [
    {key:'research',name:'Research / Classify',color:'var(--chegg-orange)'},
    {key:'classify',name:'Brief & Blueprint',color:'var(--l2)'},
    {key:'blueprint',name:'SME Review',color:'var(--l4)'},
    {key:'production',name:'In Production',color:'var(--lm-green)'},
    {key:'published',name:'Published',color:'var(--slate)'},
  ];

  v.innerHTML = `
${trackerBanner()}
<div class="page-header">
  <p class="eyebrow">Step 4–5 · Human Teams</p>
  <h1 class="page-title">Production Board</h1>
  <p class="page-sub">Every content item tracked from research to LMS publish. Cards with a flashing border are newly arrived — click to acknowledge. Clicking a card opens the detail modal with promote/demote controls.</p>
</div>

<div class="metrics" style="grid-template-columns:repeat(5,1fr);margin-bottom:18px;">
  ${cols.map(c=>`
  <div class="metric" style="--accent:${c.color};">
    <span class="k">${c.name}</span>
    <div class="v">${state.kanban[c.key].length}</div>
    <div class="trend">${state.kanban[c.key].length===0?'Clear':'active'}</div>
  </div>`).join('')}
</div>

<div style="display:flex;justify-content:flex-end;margin-bottom:12px;gap:10px;">
  <button class="btn sm" onclick="openAddItem()">+ Add item</button>
</div>

<div class="kanban">
  ${cols.map(c=>`
  <div class="kol">
    <div class="kol-head">
      <span style="width:9px;height:9px;border-radius:50%;background:${c.color};display:inline-block;flex:0 0 9px;"></span>
      <span class="kh-name">${c.name}</span>
      <span class="kh-count">${state.kanban[c.key].length}</span>
    </div>
    ${state.kanban[c.key].length===0
      ? `<div style="font-size:12px;color:var(--slate-2);font-style:italic;padding:8px 4px;">Empty</div>`
      : state.kanban[c.key].map(k=>{
          const isNew = state.newProductionIds.has(k.id);
          return `
    <div class="k-card ${isNew?'new-item':''}" id="kcard-${k.id}" onclick="openKanbanCard('${k.id}','${c.key}')">
      ${isNew?`<div class="new-pip"></div><div style="font-size:10px;font-weight:700;color:var(--chegg-orange);margin-bottom:5px;">● NEW — click to acknowledge</div>`:''}
      <div class="kc-title">${esc(k.title)}</div>
      <div class="kc-meta">${layerBadge(k.layer)}<span class="sev ${k.sev}">${k.sev.toUpperCase()}</span></div>
      <div class="kc-due ${daysUntil(k.due)<0?'overdue':''}">📅 ${fmt(k.due)} ${daysUntil(k.due)<0?'OVERDUE':daysUntil(k.due)===0?'TODAY':'('+daysUntil(k.due)+'d)'}</div>
      <div class="kc-assign"><span class="av">${(k.assign||'?').slice(0,2).toUpperCase()}</span>${esc(k.assign||'Unassigned')}</div>
    </div>`;}).join('')}
    ${c.key!=='published'?`<button class="btn sm ghost" style="width:100%;margin-top:7px;justify-content:center;border-style:dashed;" onclick="openAddItem('${c.key}')">+ Add</button>`:''}
  </div>`).join('')}
</div>`;
}

function openKanbanCard(id, colKey) {
  // Acknowledge — remove from new set and stop flash
  if(state.newProductionIds.has(id)) {
    state.newProductionIds.delete(id);
    const el = document.getElementById('kcard-'+id);
    if(el) el.classList.remove('new-item');
  }

  let item;
  for(const col of Object.values(state.kanban)){item=col.find(k=>k.id===id);if(item)break;}
  if(!item) return;

  const cols=['research','classify','blueprint','production','published'];
  const curIdx=cols.indexOf(colKey);

  openModal(item.title,`
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
      ${layerBadge(item.layer)}${statusBadge(colKey)}<span class="sev ${item.sev}">${item.sev.toUpperCase()}</span>
      ${item.fromFlow?'<span class="badge ai">🔗 From pipeline flow</span>':''}
    </div>
    <div style="display:grid;gap:9px;margin-bottom:18px;">
      ${[{k:'Assignee',v:item.assign},{k:'Due',v:fmt(item.due)},{k:'Layer',v:LAYERS[item.layer]?.name||item.layer},{k:'Stage',v:colKey}]
        .map(r=>`<div style="display:flex;gap:12px;font-size:13px;"><span style="font-weight:700;width:90px;color:var(--slate);">${r.k}</span><span>${esc(r.v)}</span></div>`).join('')}
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-weight:700;font-size:13px;display:block;margin-bottom:6px;">Status note</label>
      <textarea id="kcard-note" style="width:100%;border:1px solid var(--hair);border-radius:9px;padding:11px;font-size:13px;min-height:80px;resize:vertical;" placeholder="Add a note, blocker, or status update..."></textarea>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      ${curIdx<cols.length-1?`<button class="btn green" onclick="promoteCard('${id}','${colKey}','${cols[curIdx+1]}')">→ Move to ${cols[curIdx+1]}</button>`:''}
      ${curIdx>0?`<button class="btn ghost" onclick="promoteCard('${id}','${colKey}','${cols[curIdx-1]}')">← Move back</button>`:''}
      <button class="btn ghost" onclick="saveNote('${id}')">Save note</button>
      <button class="btn ghost" onclick="closeModal()">Close</button>
    </div>`);
}

function saveNote(id) {
  const note = document.getElementById('kcard-note')?.value;
  if(note) toast('Note saved',true,note.slice(0,60));
  closeModal();
}

function promoteCard(id, from, to) {
  let item;
  for(const col of Object.values(state.kanban)){item=col.find(k=>k.id===id);if(item)break;}
  if(!item) return;
  const arr=state.kanban[from];
  arr.splice(arr.indexOf(item),1);
  state.kanban[to].push(item);
  // If promoted to production, flash
  if(to==='production'){ state.newProductionIds.add(id); item.fromFlow=true; }
  // advance tracker if this is the tracked item
  const stageMap={research:0,classify:1,blueprint:2,production:3,published:4};
  if(state.activeItem && item.sourceId===state.activeItem.id) {
    state.activeStage = Math.max(state.activeStage, stageMap[to]||0);
  }
  if(to==='published'&&state.activeStage<4) state.activeStage=4;
  closeModal();
  toast(`Moved to "${to}"`,true);
  renderProduction();
}

function openAddItem(col='research') {
  openModal('Add Item to Board',`
    <div style="display:grid;gap:12px;">
      <div><label style="display:block;font-weight:700;font-size:13px;margin-bottom:5px;">Title</label>
        <input id="ni-title" style="width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--hair);font-size:13px;" placeholder="e.g. Claude memory feature — L3 Drop"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label style="display:block;font-weight:700;font-size:13px;margin-bottom:5px;">Layer</label>
          <select id="ni-layer" style="width:100%;padding:9px;border-radius:9px;border:1px solid var(--hair);font-size:13px;">
            ${Object.keys(LAYERS).map(k=>`<option value="${k}">${k}</option>`).join('')}
          </select></div>
        <div><label style="display:block;font-weight:700;font-size:13px;margin-bottom:5px;">Priority</label>
          <select id="ni-sev" style="width:100%;padding:9px;border-radius:9px;border:1px solid var(--hair);font-size:13px;">
            <option value="high">High</option><option value="med" selected>Medium</option><option value="low">Low</option>
          </select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label style="display:block;font-weight:700;font-size:13px;margin-bottom:5px;">Due date</label>
          <input id="ni-due" type="date" value="2026-06-30" style="width:100%;padding:9px;border-radius:9px;border:1px solid var(--hair);font-size:13px;"></div>
        <div><label style="display:block;font-weight:700;font-size:13px;margin-bottom:5px;">Assignee</label>
          <select id="ni-assign" style="width:100%;padding:9px;border-radius:9px;border:1px solid var(--hair);font-size:13px;">
            <option>LD Lead</option><option>Stuart V.</option><option>Shyama C.</option><option>Friedl K.</option><option>Geetika S.</option><option>Anil T.</option>
          </select></div>
      </div>
      <div><label style="display:block;font-weight:700;font-size:13px;margin-bottom:5px;">Start stage</label>
        <select id="ni-col" style="width:100%;padding:9px;border-radius:9px;border:1px solid var(--hair);font-size:13px;">
          <option value="research" ${col==='research'?'selected':''}>Research / Classify</option>
          <option value="classify" ${col==='classify'?'selected':''}>Brief & Blueprint</option>
          <option value="blueprint" ${col==='blueprint'?'selected':''}>SME Review</option>
          <option value="production" ${col==='production'?'selected':''}>In Production</option>
        </select></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px;">
      <button class="btn primary" onclick="addKanbanItem()">Add</button>
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function addKanbanItem() {
  const title=document.getElementById('ni-title')?.value.trim();
  if(!title){toast('Enter a title');return;}
  const id='km_'+Date.now();
  const item={id,title,layer:document.getElementById('ni-layer').value,sev:document.getElementById('ni-sev').value,due:document.getElementById('ni-due').value,assign:document.getElementById('ni-assign').value,fromFlow:false};
  const col=document.getElementById('ni-col').value;
  state.kanban[col].push(item);
  closeModal();
  toast('Item added',true);
  renderProduction();
}

/* ═══════════════════════════════════════════════════
   SCHEDULE
═══════════════════════════════════════════════════ */
function renderSchedule() {
  const v = document.getElementById('view');
  const STEPS=['Discover','Decide','Draft','Produce','Publish'];
  const SI={planned:0,'new-trigger':0,researching:0,decided:1,drafting:2,'in-review':2,producing:3,published:4};

  v.innerHTML=`
${trackerBanner()}
<div class="page-header">
  <p class="eyebrow">Editorial Calendar</p>
  <h1 class="page-title">Production Schedule</h1>
  <p class="page-sub">Rolling bi-weekly L3 drops · platform-triggered L2 updates · quarterly L1 reviews · automated L4 catch-ups.</p>
</div>

<div class="panel">
  <div class="panel-head"><h2>14-Day Sprint Calendar</h2><span class="badge ai">● Bi-weekly year-round</span></div>
  ${state.schedule.map(s=>{
    const idx=SI[s.status]||0;
    const over=daysUntil(s.date)<0&&s.status!=='published';
    return `
  <div class="sch-row">
    <div class="sch-date">${fmt(s.date)}<small>${over?'OVERDUE':Math.abs(daysUntil(s.date))+'d '+(daysUntil(s.date)>=0?'away':'ago')}</small></div>
    <div>
      <div class="sch-topic ${s.topic?'':'empty'}">${esc(s.topic)||'Topic TBD'}</div>
      <div class="sch-chips">${layerBadge(s.layer)}${statusBadge(s.status)}${s.assignee?`<span style="font-size:11px;color:var(--slate);">👤 ${esc(s.assignee)}</span>`:''}</div>
      <div class="stepper" style="margin-top:8px;">
        ${STEPS.map((st,i)=>{
          const isDone2 = i < idx || (i === idx && s.status === 'published');
          const isActive2 = i === idx && s.status !== 'published';
          return `
        <div class="step ${isDone2?'done':isActive2?'cur':''}">
          <div class="step-dot">${isDone2?'✓':''}</div>
          ${i<STEPS.length-1?`<div class="step-bar"></div>`:''}
        </div>`;}).join('')}
        <span style="font-size:11px;color:var(--slate);margin-left:7px;">${s.status==='published'?'Published':STEPS[Math.min(idx,4)]}</span>
      </div>
    </div>
    <div class="sch-act">
      ${s.status==='published'?`<button class="pub">✓ Published</button>`:`<button onclick="openSprintDetail('${s.id}')">Open →</button>`}
    </div>
  </div>`;}).join('')}
</div>

<div class="panel" style="border-left:4px solid var(--l2);">
  <div class="panel-head"><h2>⚡ Platform Triggers (L2)</h2><span class="badge l2">● Auto-alert · major releases</span></div>
  <p class="section-lead">When the Research Agent detects a major platform release, it creates a triggered slot. LD Lead reviews and confirms whether to open a platform course update sprint.</p>
  <div style="background:var(--l2-soft);border:1px solid var(--l2-line);border-radius:10px;padding:15px;margin-bottom:12px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;">
      <span style="font-size:15px;">⚡</span><div style="font-weight:800;font-size:14px;">Claude Projects & Notebooks — GA</div>
      <span class="badge l2" style="margin-left:auto;">L2 · Platform</span>
    </div>
    <div style="font-size:12.5px;color:var(--slate);margin-bottom:10px;">Detected Jun 10 · Anthropic blog · HIGH · Affects: Claude course v1.0 → v2.0</div>
    <div style="display:flex;gap:8px;">
      <button class="btn sm orange" onclick="approveL2Trigger()">✓ Approve update sprint</button>
      <button class="btn sm ghost" onclick="toast('Trigger dismissed')">Dismiss</button>
    </div>
  </div>
  <div style="font-size:12.5px;color:var(--slate);">No other pending triggers.</div>
</div>`;
}

function openSprintDetail(id) {
  const s=state.schedule.find(x=>x.id===id);
  if(!s) return;
  openModal(`Sprint: ${s.label}`,`
    <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px;">${layerBadge(s.layer)}${statusBadge(s.status)}</div>
    <div style="display:grid;gap:9px;margin-bottom:18px;">
      ${[{k:'Date',v:fmt(s.date)},{k:'Topic',v:s.topic||'TBD'},{k:'Assignee',v:s.assignee||'Unassigned'}]
        .map(r=>`<div style="display:flex;gap:12px;font-size:13px;"><span style="font-weight:700;width:90px;color:var(--slate);">${r.k}</span><span>${esc(r.v)}</span></div>`).join('')}
    </div>
    <div style="background:var(--mist);border-radius:10px;padding:13px;margin-bottom:16px;">
      <div style="font-weight:700;font-size:12.5px;margin-bottom:8px;">14-Day Sprint</div>
      ${[{d:'Day 1',l:'Sourcing & delta check',r:'AI Agent'},{d:'Day 2',l:'Topic brief — LD Lead approves',r:'LD Lead + Claude'},{d:'Days 3–7',l:'Concurrent production streams',r:'Production team'},{d:'Days 8–14',l:'Live validation, QA, SCORM, LMS',r:'QA + LD Lead'}]
        .map(t=>`<div style="display:grid;grid-template-columns:80px 1fr 100px;gap:8px;padding:6px 0;border-bottom:1px solid var(--hair);font-size:12px;">
          <span style="font-family:var(--mono);font-weight:700;color:var(--chegg-orange);">${t.d}</span><span>${t.l}</span><span style="font-size:10.5px;color:var(--slate);">${t.r}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:9px;">
      <button class="btn primary" onclick="advanceSprint('${s.id}')">Advance sprint</button>
      <button class="btn ghost" onclick="closeModal()">Close</button>
    </div>`);
}

function advanceSprint(id) {
  const s=state.schedule.find(x=>x.id===id);
  if(!s) return;
  const seq=['planned','decided','drafting','in-review','producing','published'];
  const i=seq.indexOf(s.status);
  if(i<seq.length-1){s.status=seq[i+1];toast(`Sprint advanced to "${seq[i+1]}"`,true);}
  closeModal();
  renderSchedule();
}

function approveL2Trigger() {
  state.kanban.research.push({id:'kl2_'+Date.now(),title:'Claude Projects & Notebooks — L2 platform course update',layer:'L2',sev:'high',due:'2026-06-30',assign:'LD Lead',fromFlow:false});
  toast('L2 trigger approved — added to Research/Classify queue',true);
  renderSchedule();
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
updateResearchBadge();
setView('dashboard');
</script>
</body>
</html>
